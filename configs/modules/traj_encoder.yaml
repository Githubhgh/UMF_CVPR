traj_encoder:
  target: umf.models.architectures.umf_traj_encoder.UmfTrajEncoder
  params:
    ff_size: 1024
    num_layers: 9
    num_heads: 4
    dropout: 0.1
    normalize_before: false
    activation: 'gelu'
    position_embedding: 'learned'
    latent_dim: ${model.latent_dim}
    nfeats: ${DATASET.NJOINTS}
